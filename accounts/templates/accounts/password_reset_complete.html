{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% trans "Password Changed | OfficeEase" %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-brand-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md rounded-[24px] bg-white p-8 text-center shadow-[0_40px_90px_rgba(26,79,214,0.18)]">
    <p class="text-[11px] font-black uppercase tracking-[0.3em] text-blue-600">OfficeEase</p>
    <h1 class="mt-3 text-3xl font-black text-slate-900">{% trans "Password updated" %}</h1>
    <p class="mt-3 text-sm text-slate-600">{% trans "Your password has been changed successfully." %}</p>
    <a href="{% url 'auth' %}" class="mt-6 inline-flex rounded-2xl bg-blue-600 px-5 py-3 text-sm font-bold text-white transition hover:bg-blue-700">
      {% trans "Sign in again" %}
    </a>
  </div>
</body>
</html>
