{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% trans "Reset Password | OfficeEase" %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-brand-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md rounded-[24px] bg-white p-8 shadow-[0_40px_90px_rgba(26,79,214,0.18)]">
    <p class="text-[11px] font-black uppercase tracking-[0.3em] text-blue-600">OfficeEase</p>
    <h1 class="mt-3 text-3xl font-black text-slate-900">{% trans "Forgot your password?" %}</h1>
    <p class="mt-3 text-sm text-slate-600">{% trans "Enter your email address and we’ll send you reset instructions." %}</p>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div>
        <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="id_email">{% trans "Email address" %}</label>
        <input type="email" name="email" autocomplete="email" required id="id_email"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-600/10" />
      </div>
      <button type="submit" class="w-full rounded-2xl bg-blue-600 px-4 py-3 text-sm font-bold text-white transition hover:bg-blue-700">
        {% trans "Send reset link" %}
      </button>
    </form>

    <div class="mt-5 text-center text-sm text-slate-600">
      <a href="{% url 'auth' %}" class="font-semibold text-blue-600 hover:text-blue-700">{% trans "Back to sign in" %}</a>
    </div>
  </div>
</body>
</html>
